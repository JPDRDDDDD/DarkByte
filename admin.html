<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="frame-ancestors 'none';">
    <title>Painel Administrativo - DarkByte</title>
    <style>
        :root {
            --bg: #0b0b0b;
            --surface: #141414;
            --surface-2: #1b1b1b;
            --text: #f5f5f5;
            --muted: #9ca3af;
            --primary: #3b82f6;
            --danger: #ef4444;
            --border: rgba(255,255,255,0.1);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: Inter, "Segoe UI", Roboto, sans-serif;
            padding: 20px;
        }
        .wrap {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 16px;
            flex-wrap: wrap;
        }
        .title {
            font-size: 1.8rem;
            font-weight: 800;
        }
        .status {
            color: var(--muted);
            font-size: 0.95rem;
        }
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        thead th {
            text-align: left;
            font-size: 0.85rem;
            color: var(--muted);
            background: var(--surface-2);
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }
        tbody td {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            vertical-align: top;
        }
        input, select {
            width: 100%;
            background: #111;
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 9px 10px;
            outline: none;
        }
        .hash {
            font-family: Consolas, monospace;
            font-size: 0.78rem;
            max-width: 360px;
            word-break: break-all;
            color: #d1d5db;
        }
        .actions {
            display: flex;
            gap: 8px;
        }
        button {
            border: none;
            border-radius: 10px;
            padding: 9px 12px;
            color: white;
            cursor: pointer;
            font-weight: 700;
        }
        .btn-save { background: var(--primary); }
        .btn-logout { background: var(--danger); }
        .empty {
            padding: 16px;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="header">
            <div>
                <div class="title">Painel Administrativo</div>
                <div id="current-user" class="status">Carregando sessao...</div>
            </div>
            <div class="actions">
                <button id="refresh-btn" class="btn-save">Atualizar</button>
                <button id="logout-btn" class="btn-logout">Sair</button>
            </div>
        </div>

        <div class="panel">
            <table>
                <thead>
                    <tr>
                        <th>Nome completo</th>
                        <th>Email</th>
                        <th>Senha (hash)</th>
                        <th>Cargo</th>
                        <th>Nova senha</th>
                        <th>Acoes</th>
                    </tr>
                </thead>
                <tbody id="users-body"></tbody>
            </table>
            <div id="empty-state" class="empty" style="display:none;">Nenhum usuario encontrado.</div>
        </div>
    </div>

    <script>
        const usersBody = document.getElementById('users-body');
        const emptyState = document.getElementById('empty-state');
        const currentUserEl = document.getElementById('current-user');
        const refreshBtn = document.getElementById('refresh-btn');
        const logoutBtn = document.getElementById('logout-btn');

        let currentUser = null;
        let users = [];

        async function apiRequest(url, options = {}) {
            const response = await fetch(url, {
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                ...options
            });
            const payload = await response.json().catch(() => ({}));
            if (!response.ok) throw new Error(payload.error || 'Falha na API');
            return payload;
        }

        function canAccessPanel(role) {
            const value = String(role || '').toLowerCase();
            return value === 'owner' || value === 'co-owner';
        }

        function canEditRow(user) {
            if (!currentUser) return false;
            if (currentUser.role === 'owner') return true;
            if (currentUser.role !== 'co-owner') return false;
            if (user.role === 'owner') return false;
            if (user.role === 'co-owner' && user.email !== currentUser.email) return false;
            return true;
        }

        function roleOptions(selectedRole, disabled) {
            const roles = ['owner', 'co-owner', 'atendente', 'cliente'];
            return `<select ${disabled ? 'disabled' : ''} class="role-input">
                ${roles.map((role) => `<option value="${role}" ${selectedRole === role ? 'selected' : ''}>${role}</option>`).join('')}
            </select>`;
        }

        function renderTable() {
            usersBody.innerHTML = '';
            if (!users.length) {
                emptyState.style.display = 'block';
                return;
            }
            emptyState.style.display = 'none';
            for (const user of users) {
                const locked = !canEditRow(user);
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><input class="name-input" value="${escapeHtml(user.fullName || '')}" ${locked ? 'disabled' : ''}></td>
                    <td>${escapeHtml(user.email || '')}</td>
                    <td><div class="hash">${escapeHtml(user.passwordHash || '')}</div></td>
                    <td>${roleOptions(user.role, locked)}</td>
                    <td><input type="password" class="password-input" placeholder="Nova senha" ${locked ? 'disabled' : ''}></td>
                    <td>
                        <button class="btn-save save-btn" ${locked ? 'disabled' : ''}>Salvar</button>
                    </td>
                `;
                const saveBtn = row.querySelector('.save-btn');
                if (!locked) {
                    saveBtn.addEventListener('click', async () => {
                        const fullName = row.querySelector('.name-input').value.trim();
                        const role = row.querySelector('.role-input').value;
                        const newPassword = row.querySelector('.password-input').value;
                        try {
                            await apiRequest(`/api/admin/users/${encodeURIComponent(user.email)}`, {
                                method: 'PATCH',
                                body: JSON.stringify({
                                    fullName,
                                    role,
                                    newPassword
                                })
                            });
                            row.querySelector('.password-input').value = '';
                            await loadUsers();
                        } catch (error) {
                            alert(error.message || 'Falha ao atualizar usuario.');
                        }
                    });
                }
                usersBody.appendChild(row);
            }
        }

        function escapeHtml(value) {
            return String(value || '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;');
        }

        async function loadUsers() {
            const payload = await apiRequest('/api/admin/users');
            currentUser = payload.currentUser;
            if (!canAccessPanel(currentUser.role)) {
                window.location.href = '/';
                return;
            }
            currentUserEl.textContent = `Logado como ${currentUser.fullName} (${currentUser.email}) - ${currentUser.role}`;
            users = payload.users || [];
            renderTable();
        }

        refreshBtn.addEventListener('click', async () => {
            try {
                await loadUsers();
            } catch (error) {
                alert(error.message || 'Falha ao carregar dados.');
            }
        });

        logoutBtn.addEventListener('click', async () => {
            try {
                await apiRequest('/api/auth/logout', { method: 'POST', body: '{}' });
            } catch {
                // ignore
            } finally {
                window.location.href = '/';
            }
        });

        loadUsers().catch((error) => {
            alert(error.message || 'Acesso negado ao painel.');
            window.location.href = '/';
        });
    </script>
</body>
</html>
